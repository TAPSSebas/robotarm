<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robot Arm</title>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
<link rel="manifest" href="./site.webmanifest">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 1rem; max-width: 700px; margin: auto; }
  h3 { font-size: 13px; color: #888; font-weight: 400; margin-bottom: 10px; text-transform: lowercase; }
  .card { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
  #emergency { width: 100%; padding: 14px; background: #c0392b; color: #fff; border: none; border-radius: 10px; font-size: 17px; cursor: pointer; margin-bottom: 12px; }
  #emergency.resumed { background: #27ae60; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; margin-bottom: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #27ae60; }
  .dot.red { background: #c0392b; }
  img#cam { width: 100%; border-radius: 8px; border: 1px solid #2a2a2a; display: block; }
  .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .cpill { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
  .cpill.active { border-color: #fff; }
  .spill { flex: 1; padding: 8px 4px; border: 1px solid #2a2a2a; border-radius: 8px; cursor: pointer; text-align: center; font-size: 12px; color: #888; background: #1c1c1c; }
  .spill.active { border-color: #555; color: #eee; background: #252525; }
  .joypad { display: grid; grid-template-columns: repeat(3, 52px); gap: 6px; justify-content: center; margin: 8px 0; }
  .jbtn { width: 52px; height: 52px; border: 1px solid #2a2a2a; border-radius: 8px; background: #1c1c1c; color: #eee; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .jbtn:active { background: #2a2a2a; }
  .jbtn.empty { border: none; background: transparent; pointer-events: none; }
  .row { display: flex; gap: 10px; }
  .gbtn { flex: 1; padding: 12px; border: 1px solid #2a2a2a; border-radius: 8px; background: #1c1c1c; color: #eee; font-size: 14px; cursor: pointer; }
  .gbtn:active { background: #252525; }
  input[type=range] { width: 100%; accent-color: #555; }
  .log { background: #111; border-radius: 8px; padding: 10px 12px; font-size: 12px; font-family: monospace; max-height: 100px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
  .log-entry { display: flex; gap: 8px; }
  .log-time { color: #555; }
  .ok { color: #27ae60; }
  .err { color: #c0392b; }
  .warn { color: #f39c12; }
  .auto-btn { width: 100%; padding: 10px; border: 1px solid #2a2a2a; border-radius: 8px; background: #1c1c1c; color: #888; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
  .auto-btn.on { background: #1a3a2a; color: #27ae60; border-color: #27ae60; }

  /* Sorteer knop */
  #sortBtn { width: 100%; padding: 16px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; background: #2980b9; color: #fff; margin-bottom: 8px; }
  #sortBtn:disabled { background: #333; color: #666; cursor: default; }
  #sortBtn.busy { background: #e67e22; }

  /* Voortgang tabel */
  #progressTable { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; display: none; }
  #progressTable th { text-align: left; color: #555; font-weight: 400; padding: 4px 6px; border-bottom: 1px solid #2a2a2a; }
  #progressTable td { padding: 5px 6px; border-bottom: 1px solid #1a1a1a; }
  .status-bezig  { color: #f39c12; }
  .status-klaar  { color: #27ae60; }
  .status-timeout { color: #c0392b; }

  /* Resultaten formulier */
  #resultatenSection { display: none; }
  .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .form-row input, .form-row textarea {
    flex: 1; padding: 10px; border: 1px solid #2a2a2a; border-radius: 8px;
    background: #111; color: #eee; font-size: 14px; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }
  #saveBtn { width: 100%; padding: 12px; background: #27ae60; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  #saveBtn:disabled { background: #333; color: #666; }
  #savedMsg { text-align: center; font-size: 13px; color: #27ae60; margin-top: 8px; display: none; }
</style>
</head>
<body>

<button id="emergency" onclick="togglePause()">⏹ noodstop</button>
<div class="status"><div class="dot" id="sdot"></div><span id="stxt">gereed</span></div>

<div class="card">
  <h3>camera feed</h3>
  <img id="cam" src="/video" alt="camera">
</div>

<!-- SORTEER KNOP -->
<div class="card">
  <h3>automatisch sorteren</h3>
  <button id="sortBtn" onclick="startSort()">▶ start sorteren</button>
  <table id="progressTable">
    <thead><tr><th>#</th><th>kleur</th><th>vorm</th><th>status</th></tr></thead>
    <tbody id="progressBody"></tbody>
  </table>
</div>

<!-- RESULTATEN (verschijnt na sorteren) -->
<div class="card" id="resultatenSection">
  <h3>resultaten invoeren</h3>
  <div class="form-row">
    <input type="text" id="naam"  placeholder="Naam">
    <input type="text" id="klas"  placeholder="Klas">
  </div>
  <div class="form-row">
    <textarea id="notities" placeholder="Notities / observaties (optioneel)"></textarea>
  </div>
  <button id="saveBtn" onclick="saveResults()">💾 resultaten opslaan</button>
  <div id="savedMsg">✓ Opgeslagen in resultaten.txt</div>
</div>

<!-- AUTO PICK (specifieke kleur/vorm) -->
<div class="card">
  <h3>target kleur</h3>
  <div class="pills" id="cpills">
    <div class="cpill active" style="background:#e74c3c" data-c="red"    onclick="setColor(this)"></div>
    <div class="cpill"        style="background:#3498db" data-c="blue"   onclick="setColor(this)"></div>
    <div class="cpill"        style="background:#2ecc71" data-c="green"  onclick="setColor(this)"></div>
    <div class="cpill"        style="background:#f1c40f" data-c="yellow" onclick="setColor(this)"></div>
  </div>
  <h3 style="margin-top:14px;">target vorm</h3>
  <div class="pills" id="spills">
    <div class="spill active" data-s="cube"     onclick="setShape(this)">cube</div>
    <div class="spill"        data-s="sphere"   onclick="setShape(this)">sphere</div>
    <div class="spill"        data-s="cylinder" onclick="setShape(this)">cylinder</div>
    <div class="spill"        data-s="any"      onclick="setShape(this)">any</div>
  </div>
  <div style="margin-top:12px;">
    <button class="auto-btn" id="autobtn" onclick="toggleAuto()">▶ start auto pick</button>
  </div>
</div>

<!-- HANDMATIG -->
<div class="card">
  <h3>handmatige besturing</h3>
  <div class="joypad">
    <div class="jbtn empty"></div>
    <div class="jbtn" onclick="jog('forward')">↑</div>
    <div class="jbtn empty"></div>
    <div class="jbtn" onclick="jog('left')">←</div>
    <div class="jbtn empty"></div>
    <div class="jbtn" onclick="jog('right')">→</div>
    <div class="jbtn empty"></div>
    <div class="jbtn" onclick="jog('back')">↓</div>
    <div class="jbtn empty"></div>
  </div>
  <div class="row" style="margin:8px 0;">
    <div class="jbtn" style="flex:1;width:auto;" onclick="jog('up')">↑ omhoog</div>
    <div class="jbtn" style="flex:1;width:auto;" onclick="jog('down')">↓ omlaag</div>
  </div>
  <div class="row" style="margin-bottom:12px;">
    <button class="gbtn" onclick="grip('open')">◁ gripper open</button>
    <button class="gbtn" onclick="grip('close')">▷ gripper dicht</button>
  </div>
  <h3>snelheid — <span id="spd-label">50%</span></h3>
  <input type="range" min="1" max="100" value="50" step="1" oninput="setSpeed(this.value)">
</div>

<div class="card">
  <h3>log</h3>
  <div class="log" id="log"></div>
</div>

<script>
const socket = io();
let paused = false;
let auto   = false;
let logT   = 0;
let lastSortItems = [];

socket.on('log',           d => addLog(d.msg, d.type || 'ok'));
socket.on('sort_start',    () => { clearProgress(); showProgress(true); });
socket.on('sort_progress', items => updateProgress(items));
socket.on('sort_done',     d => {
  lastSortItems = d.items;
  setSortBusy(false);
  document.getElementById('resultatenSection').style.display = 'block';
  addLog('sorteren klaar — vul je naam in en sla op', 'ok');
});

function addLog(msg, type='ok') {
  logT++;
  const log = document.getElementById('log');
  const s = `<div class="log-entry"><span class="log-time">${String(logT).padStart(3,'0')}</span><span class="${type}">${msg}</span></div>`;
  log.insertAdjacentHTML('beforeend', s);
  log.scrollTop = log.scrollHeight;
}

async function api(path, body={}) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  return r.json();
}

function togglePause() {
  api('/api/pause').then(d => {
    paused = d.paused;
    document.getElementById('emergency').textContent = paused ? '▶ hervat' : '⏹ noodstop';
    document.getElementById('emergency').classList.toggle('resumed', !paused);
    document.getElementById('sdot').classList.toggle('red', paused);
    document.getElementById('stxt').textContent = paused ? 'gestopt' : 'actief';
  });
}

function setColor(el) {
  document.querySelectorAll('.cpill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  api('/api/target', { color: el.dataset.c });
}

function setShape(el) {
  document.querySelectorAll('.spill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  api('/api/target', { shape: el.dataset.s });
}

function toggleAuto() {
  api('/api/auto').then(d => {
    auto = d.auto;
    const btn = document.getElementById('autobtn');
    btn.textContent = auto ? '⏹ stop auto pick' : '▶ start auto pick';
    btn.classList.toggle('on', auto);
  });
}

// --- Sorteren ---
function startSort() {
  api('/api/sort').then(d => {
    if (d.ok) {
      setSortBusy(true);
      document.getElementById('resultatenSection').style.display = 'none';
      document.getElementById('savedMsg').style.display = 'none';
      addLog('sorteren gestart…', 'ok');
    } else {
      addLog('kan niet starten: ' + d.reason, 'err');
    }
  });
}

function setSortBusy(busy) {
  const btn = document.getElementById('sortBtn');
  btn.disabled = busy;
  btn.classList.toggle('busy', busy);
  btn.textContent = busy ? '⏳ bezig met sorteren…' : '▶ start sorteren';
}

function clearProgress() {
  document.getElementById('progressBody').innerHTML = '';
}

function showProgress(visible) {
  document.getElementById('progressTable').style.display = visible ? 'table' : 'none';
}

function updateProgress(items) {
  const tbody = document.getElementById('progressBody');
  tbody.innerHTML = '';
  items.forEach(item => {
    const cls = `status-${item.status}`;
    tbody.insertAdjacentHTML('beforeend',
      `<tr>
        <td>${item.index}</td>
        <td>${item.color}</td>
        <td>${item.shape}</td>
        <td class="${cls}">${item.status}</td>
      </tr>`);
  });
}

// --- Resultaten opslaan ---
function saveResults() {
  const naam     = document.getElementById('naam').value.trim();
  const klas     = document.getElementById('klas').value.trim();
  const notities = document.getElementById('notities').value.trim();
  if (!naam) { alert('Vul je naam in'); return; }

  document.getElementById('saveBtn').disabled = true;
  api('/api/results', { naam, klas, notities, items: lastSortItems }).then(d => {
    if (d.ok) {
      document.getElementById('savedMsg').style.display = 'block';
    }
  });
}

// --- Handmatig ---
function jog(dir) { api('/api/jog', { direction: dir }); }
function grip(a)  { api('/api/gripper', { action: a }); }
function setSpeed(v) {
  document.getElementById('spd-label').textContent = v + '%';
  api('/api/speed', { speed: v });
}

addLog('ui geladen · verbinden met arm…', 'ok');
</script>
</body>
</html>
